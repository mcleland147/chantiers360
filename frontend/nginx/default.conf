server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # React Router — refresh sur routes applicatives
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Assets Vite (hashés) — cache long
    location ~* \.(?:css|js|mjs|map|woff2?|ttf|eot|svg|ico|png|jpg|jpeg|gif|webp)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # index.html — pas de cache agressif (déploiements)
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-cache";
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
}
