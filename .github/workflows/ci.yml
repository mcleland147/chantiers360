# Chantiers360 — CI qualité + Docker (Phase K3)
name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  JWT_SECRET: ci-test-jwt-secret-minimum-32-characters-long

jobs:
  quality-frontend:
    name: Frontend — lint, test, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (advisory — dette ESLint existante)
        run: npm run lint
        continue-on-error: true

      - name: Unit tests (Vitest)
        run: npm run test

      - name: Production build
        run: npm run build

  quality-backend:
    name: Backend — lint, test, API, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate

      - name: Lint (advisory)
        run: npm run lint:ci
        continue-on-error: true

      - name: Unit tests (Jest)
        run: npm run test

      - name: API tests (Supertest)
        run: npm run test:api
        env:
          NODE_ENV: test

      - name: Production build
        run: npm run build

  security-audit:
    name: Dependency audit (npm)
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      matrix:
        workspace: [frontend, backend]
    defaults:
      run:
        working-directory: ${{ matrix.workspace }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ matrix.workspace }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: npm audit (high+)
        run: npm audit --audit-level=high

  docker:
    name: Docker — build & smoke
    runs-on: ubuntu-latest
    needs: [quality-frontend, quality-backend]
    steps:
      - uses: actions/checkout@v4

      - name: Prepare CI env file
        run: bash scripts/ci-prepare-env.sh

      - name: Validate docker-compose.prod.yml
        run: docker compose -f docker-compose.prod.yml --env-file .env.ci config

      - name: Build production images
        run: |
          docker compose -f docker-compose.prod.yml --env-file .env.ci build \
            --build-arg VITE_API_BASE_URL=/api

      - name: Smoke test — stack minimal
        run: bash scripts/ci-docker-smoke.sh
